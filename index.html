<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Automation Tools</title>

<style>
  body {
    font-family: Arial;
    max-width: 800px;
    margin: 30px auto;
  }

  h2, h3 {
    text-align: center;
  }

  #drop-area {
    border: 2px dashed #666;
    padding: 30px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
    background: #f9f9f9;
  }

  #file-list {
    list-style: none;
    padding: 0;
  }

  #file-list li {
    padding: 8px;
    border: 1px solid #ccc;
    margin-bottom: 5px;
    cursor: move;
    background: #fff;
  }

  input, button {
    padding: 10px;
    margin-top: 10px;
  }

  button {
    cursor: pointer;
  }

  .section {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 2px solid #ddd;
  }
</style>
</head>

<body>

<h2>🚀 Automation Tools</h2>

<!-- ================= PDF MERGER ================= -->
<div class="section">
<h3>📄 PDF & Image Merger</h3>

<div id="drop-area">
  Drag & Drop files here or click to select
  <input type="file" id="file-input" multiple style="display:none;">
</div>

<ul id="file-list"></ul>

<button id="merge-btn">Merge Files</button>
</div>

<!-- ================= PLAYWRIGHT AUTOMATION ================= -->
<div class="section">
<h3>⚡ Generate Demographic PDF</h3>

<input type="text" id="systemId" placeholder="Enter System ID">
<br>
<button onclick="generatePDF()">Generate PDF</button>

<p id="status"></p>
</div>

<script>
// ================= PDF MERGER =================
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
let files = [];

dropArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => addFiles(e.target.files));

dropArea.addEventListener('dragover', e => e.preventDefault());
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  addFiles(e.dataTransfer.files);
});

function addFiles(selectedFiles) {
  for (let f of selectedFiles) {
    files.push(f);
  }
  renderFiles();
}

function renderFiles() {
  fileList.innerHTML = '';

  files.forEach((file, index) => {
    const li = document.createElement('li');
    li.textContent = file.name;
    li.draggable = true;

    li.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', index);
    });

    li.addEventListener('dragover', e => e.preventDefault());

    li.addEventListener('drop', e => {
      const fromIndex = e.dataTransfer.getData('text');
      const toIndex = index;
      const movedFile = files.splice(fromIndex, 1)[0];
      files.splice(toIndex, 0, movedFile);
      renderFiles();
    });

    fileList.appendChild(li);
  });
}

document.getElementById('merge-btn').addEventListener('click', async () => {
  if (files.length === 0) return alert('Select files first');

  const formData = new FormData();
  files.forEach(f => formData.append('files', f));

  const res = await fetch('/merge', { method: 'POST', body: formData });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'merged.pdf';
  a.click();
});


// ================= PLAYWRIGHT AUTOMATION =================
async function generatePDF() {
  const systemId = document.getElementById('systemId').value;
  const status = document.getElementById('status');

  if (!systemId) {
    alert('Enter System ID');
    return;
  }

  status.innerText = 'Processing... please wait ⏳';

  try {
    const res = await fetch('/generate-pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ systemId })
    });

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'demographic.pdf';
    a.click();

    status.innerText = '✅ PDF Generated!';
  } catch (err) {
    console.error(err);
    status.innerText = '❌ Error generating PDF';
  }
}
</script>

</body>
</html>
